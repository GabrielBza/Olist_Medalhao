resources:
  jobs:
    job_medalhao_rocketlab:
      name: "job_medalhao_rocketlab"
      schedule:
        quartz_cron_expression: "49 0 13 * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: "UNPAUSED"
      tasks:
        - task_key: "01_Bronze"
          notebook_task:
            notebook_path: "/Workspace/Users/gabrielbzandrade@gmail.com/RocketLab - Atividade 1/Atividade_land_to_bronze"
            base_parameters:
              data_inicio: "03-01-2016"
              data_fim: "12-31-2018"
            source: "WORKSPACE"
        - task_key: "02_Silver"
          depends_on:
            - task_key: "01_Bronze"
          notebook_task:
            notebook_path: "/Workspace/Users/gabrielbzandrade@gmail.com/RocketLab - Atividade 1/Atividade_bronze_to_silver"
            source: "WORKSPACE"
        - task_key: "03_Gold"
          depends_on:
            - task_key: "02_Silver"
          notebook_task:
            notebook_path: "/Workspace/Users/gabrielbzandrade@gmail.com/RocketLab - Atividade 1/Atividade_silver_to_gold"
            source: "WORKSPACE"
      queue:
        enabled: true
      environments:
        - environment_key: "Building_Bronze_environment"
          spec:
            environment_version: "5"
      performance_target: "PERFORMANCE_OPTIMIZED"
